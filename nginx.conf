# 公众号排版工具 - nginx 配置（IP 访问版）
# 部署：复制到 /etc/nginx/sites-available/wechat-typeset
# 然后：sudo ln -sf /etc/nginx/sites-available/wechat-typeset /etc/nginx/sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # 接受任何 IP/域名访问

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/javascript;
    gzip_min_length 1000;

    # 静态文件缓存
    location /static/ {
        alias /opt/wechat-typeset-web/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 代理到 FastAPI
    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
