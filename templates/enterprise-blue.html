<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>科技蓝 · 企业会议</title></head>
<body>

  <!-- 顶部装饰 -->

      </div>
      <!-- 年份 -->
      <div style="font-size:28px;font-weight:300;opacity:0.9;margin-bottom:8px;font-family:Georgia,serif;">2026</div>
      <!-- 主标题 -->
      <h1 style="font-size:22px;font-weight:600;color:#fff;margin:0 0 8px;letter-spacing:1px;">{{TITLE}}</h1>
      <!-- 副标题条 -->
      <div style="display:inline-block;background:rgba(255,255,255,0.25);padding:4px 14px;border-radius:4px;font-size:13px;margin-bottom:8px;">{{SUBTITLE}}</div>
      <p style="font-size:12px;opacity:0.8;margin:0;letter-spacing:2px;">创新发展 · 共赢未来</p>
      <!-- 箭头装饰 -->
      <div style="position:absolute;bottom:16px;right:24px;opacity:0.4;font-size:18px;letter-spacing:4px;">▸▸▸</div>
    </div>
  </div>

  <!-- 内容区域 -->
  {{CONTENT}}

  <!-- END -->
  <div style="text-align:center;margin:36px 0 16px;">
    <p style="font-size:13px;color:#94a3b8;letter-spacing:4px;margin:0;">- END -</p>
  </div>

</div>
</body>
</html>
