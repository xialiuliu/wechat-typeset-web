<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>禅意古朴</title></head>
<body>
<div style="max-width:680px;margin:0 auto;font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:20px 16px;">

  <!-- 主标题：深棕金，居中 -->
  <h1 style="font-size:20px;font-weight:500;color:#5c4a2a;text-align:center;letter-spacing:3px;margin:28px 0 8px;">文章主标题</h1>

  <!-- 副标题：灰棕，居中 -->
  <p style="font-size:14px;color:#9b8060;text-align:center;letter-spacing:1px;margin:0 0 20px;">副标题或日期</p>

  <!-- 分割线：金棕色 -->
  <p style="text-align:center;color:#d4c4a0;font-size:14px;margin:0 0 20px;letter-spacing:12px;">- - - - -</p>

  <!-- 引言卡片：暖米黄背景 + 金边 -->
  <section style="background:#fdf8f0;border-left:4px solid #c8a96e;padding:16px 20px;margin:16px 0;border-radius:0 8px 8px 0;">
    <p style="font-size:15px;color:#3a2e1e;line-height:1.9;margin:0;">引言内容，概括全文主旨。</p>
  </section>

  <!-- 二级标题：深棕金，居左 -->
  <h2 style="font-size:17px;font-weight:500;color:#5c4a2a;margin:28px 0 12px;letter-spacing:1px;">一、章节标题</h2>

  <!-- 正文段落 -->
  <p style="font-size:15px;color:#3a2e1e;line-height:1.9;margin:0 0 12px;">正文内容，讲述核心观点。</p>

  <!-- 经文/原文卡片：古纸米色 + 淡金边框，居中 -->
  <section style="background:#f5f0e8;border:1px solid #ddd0b0;padding:18px 28px;text-align:center;margin:16px 0;">
    <p style="font-size:16px;color:#3a2e1e;line-height:2.4;letter-spacing:2px;margin:0;">原文引用，每段独立 section，不超 300 字。</p>
  </section>

  <!-- 感悟/心得卡片：竹绿左边框 -->
  <section style="background:#f0f5ee;border-left:4px solid #7aad72;padding:16px 20px;margin:16px 0;border-radius:0 8px 8px 0;">
    <p style="font-size:14px;color:#3a2e1e;line-height:1.9;margin:0 0 8px;"><strong style="color:#5c8a52;">感悟</strong></p>
    <p style="font-size:15px;color:#3a2e1e;line-height:1.9;margin:0;">心得分享内容。</p>
  </section>

  <!-- 案例/实践卡片：暖橙左边框 -->
  <section style="background:#fdf6f0;border-left:4px solid #e8916a;padding:16px 20px;margin:16px 0;border-radius:0 8px 8px 0;">
    <p style="font-size:14px;color:#3a2e1e;line-height:1.9;margin:0 0 8px;"><strong style="color:#c47044;">实践</strong></p>
    <p style="font-size:15px;color:#3a2e1e;line-height:1.9;margin:0;">案例与实践内容。</p>
  </section>

  <!-- 提示卡片：暖米黄 + 金边（与引言同样式） -->
  <section style="background:#fdf8f0;border-left:4px solid #c8a96e;padding:16px 20px;margin:16px 0;border-radius:0 8px 8px 0;">
    <p style="font-size:15px;color:#3a2e1e;line-height:1.9;margin:0;">提示或补充说明内容。</p>
  </section>

  <!-- 列表 -->
  <ul style="font-size:15px;color:#3a2e1e;line-height:1.9;padding-left:20px;margin:12px 0;">
    <li style="margin-bottom:6px;"><strong style="color:#5c4a2a;">要点一</strong><span style="font-weight:normal;">：说明文字</span></li>
    <li style="margin-bottom:6px;"><strong style="color:#5c4a2a;">要点二</strong><span style="font-weight:normal;">：说明文字</span></li>
  </ul>

  <!-- 表格 -->
  <table style="width:100%;border-collapse:collapse;margin:16px 0;">
    <tr><th style="border:1px solid #ddd0b0;padding:10px 12px;background:#f5f0e8;color:#5c4a2a;font-weight:500;text-align:left;">项目</th><th style="border:1px solid #ddd0b0;padding:10px 12px;background:#f5f0e8;color:#5c4a2a;font-weight:500;text-align:left;">说明</th></tr>
    <tr><td style="border:1px solid #ddd0b0;padding:10px 12px;color:#3a2e1e;">内容</td><td style="border:1px solid #ddd0b0;padding:10px 12px;color:#3a2e1e;">说明</td></tr>
  </table>

  <!-- 小结卡片：古纸米色 + 居中 -->
  <section style="background:#f5f0e8;border:1px solid #ddd0b0;padding:20px 24px;text-align:center;margin:20px 0;">
    <p style="font-size:15px;color:#3a2e1e;line-height:1.9;margin:0;">总结寄语。</p>
  </section>

  <!-- 底部装饰 -->
  <p style="text-align:center;color:#b0956a;font-size:22px;margin:20px 0 4px;letter-spacing:8px;">&#9775; &#127811; &#9775;</p>
  <p style="text-align:center;font-size:12px;color:#b0956a;letter-spacing:1px;margin:0;">共创经典书房</p>

</div>
</body>
</html>
