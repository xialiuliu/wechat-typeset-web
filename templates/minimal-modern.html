<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>极简现代</title></head>
<body>
<div style="max-width:680px;margin:0 auto;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;padding:20px 16px;">

  <!-- 主标题：近黑，居中 -->
  <h1 style="font-size:22px;font-weight:500;color:#1a1a1a;text-align:center;margin:32px 0 6px;letter-spacing:1px;">文章主标题</h1>

  <!-- 副标题：中灰，居中 -->
  <p style="font-size:13px;color:#888;text-align:center;margin:0 0 24px;letter-spacing:0;">副标题或日期</p>

  <!-- 引言卡片：极浅灰背景 + 淡灰边框 -->
  <section style="background:#f8f9fa;border-left:3px solid #e1e4e8;padding:14px 18px;margin:16px 0;border-radius:4px;">
    <p style="font-size:15px;color:#333;line-height:2.0;margin:0;">引言内容，简洁有力。</p>
  </section>

  <!-- 二级标题：近黑，左对齐 -->
  <h2 style="font-size:18px;font-weight:500;color:#1a1a1a;margin:28px 0 12px;">一、章节标题</h2>

  <!-- 正文段落 -->
  <p style="font-size:15px;color:#333;line-height:2.0;margin:0 0 12px;">正文内容，清新利落。</p>

  <!-- 高亮卡片：淡蓝背景 + 蓝色左边框 -->
  <section style="background:#eef6ff;border-left:3px solid #6cb4ee;padding:14px 18px;margin:16px 0;border-radius:4px;">
    <p style="font-size:15px;color:#333;line-height:2.0;margin:0;">重点内容或核心观点。</p>
  </section>

  <!-- 提示卡片：薄荷绿背景 + 绿色左边框 -->
  <section style="background:#f0faf4;border-left:3px solid #7ec8a0;padding:14px 18px;margin:16px 0;border-radius:4px;">
    <p style="font-size:15px;color:#333;line-height:2.0;margin:0;">提示或注意事项。</p>
  </section>

  <!-- 警示卡片：极浅灰背景 + 灰色左边框 -->
  <section style="background:#f8f9fa;border-left:3px solid #aaa;padding:14px 18px;margin:16px 0;border-radius:4px;">
    <p style="font-size:15px;color:#555;line-height:2.0;margin:0;">补充说明或备注。</p>
  </section>

  <!-- 列表 -->
  <ul style="font-size:15px;color:#333;line-height:2.0;padding-left:20px;margin:12px 0;">
    <li style="margin-bottom:6px;"><strong style="color:#1a1a1a;">要点一</strong><span style="font-weight:normal;">：说明文字</span></li>
    <li style="margin-bottom:6px;"><strong style="color:#1a1a1a;">要点二</strong><span style="font-weight:normal;">：说明文字</span></li>
  </ul>

  <!-- 表格 -->
  <table style="width:100%;border-collapse:collapse;margin:16px 0;">
    <tr><th style="border:1px solid #e1e4e8;padding:10px 12px;background:#f8f9fa;color:#1a1a1a;font-weight:500;text-align:left;">项目</th><th style="border:1px solid #e1e4e8;padding:10px 12px;background:#f8f9fa;color:#1a1a1a;font-weight:500;text-align:left;">说明</th></tr>
    <tr><td style="border:1px solid #e1e4e8;padding:10px 12px;color:#333;">内容</td><td style="border:1px solid #e1e4e8;padding:10px 12px;color:#333;">说明</td></tr>
  </table>

  <!-- 引用卡片：极浅灰，左侧竖线 -->
  <section style="background:#f8f9fa;border-left:3px solid #ddd;padding:14px 18px;margin:20px 0;border-radius:4px;">
    <p style="font-size:15px;color:#555;line-height:2.0;margin:0;font-style:italic;">引用或金句。</p>
  </section>

  <!-- 底部装饰 -->
  <p style="text-align:center;color:#ccc;font-size:20px;margin:28px 0 4px;letter-spacing:12px;">- - -</p>
  <p style="text-align:center;font-size:12px;color:#aaa;letter-spacing:2px;margin:0;">感谢阅读</p>

</div>
</body>
</html>
