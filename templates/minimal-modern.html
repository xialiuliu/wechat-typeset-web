<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>极简现代</title></head>
<body>
<div style="max-width:680px;margin:0 auto;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;padding:20px 16px;">

  <!-- 主标题 -->
  <h1 style="font-size:22px;font-weight:500;color:#1a1a1a;text-align:center;margin:32px 0 6px;letter-spacing:1px;">{{TITLE}}</h1>

  <!-- 副标题 -->
  <p style="font-size:13px;color:#888;text-align:center;margin:0 0 24px;letter-spacing:0;">{{SUBTITLE}}</p>

  <!-- 内容区域 -->
  {{CONTENT}}

  <!-- 底部装饰 -->
  <p style="text-align:center;color:#ccc;font-size:20px;margin:28px 0 4px;letter-spacing:12px;">- - -</p>
  <p style="text-align:center;font-size:12px;color:#aaa;letter-spacing:2px;margin:0;">感谢阅读</p>

</div>
</body>
</html>
