<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>科技商务</title></head>
<body>
<div style="max-width:680px;margin:0 auto;font-family:'PingFang SC','Microsoft YaHei','SF Mono',monospace;padding:20px 16px;">

  <!-- 主标题：深蓝黑，居左 -->
  <h1 style="font-size:22px;font-weight:500;color:#0d1b3e;margin:28px 0 6px;letter-spacing:0;">文章主标题</h1>

  <!-- 副标题：灰蓝，居左 -->
  <p style="font-size:13px;color:#5a7ba6;margin:0 0 20px;">副标题或日期</p>

  <!-- 分割线：亮蓝 -->
  <div style="height:3px;background:linear-gradient(to right,#3b82f6,#60a5fa);border-radius:2px;margin:0 0 20px;"></div>

  <!-- 引言卡片：浅蓝背景 + 亮蓝左边框 -->
  <section style="background:#eef3fb;border-left:4px solid #3b82f6;padding:16px 20px;margin:16px 0;border-radius:0 6px 6px 0;">
    <p style="font-size:15px;color:#2c3e50;line-height:1.85;margin:0;">引言内容，清晰直接。</p>
  </section>

  <!-- 二级标题：深蓝黑 + 蓝色下划线 -->
  <h2 style="font-size:18px;font-weight:500;color:#0d1b3e;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid #3b82f6;">一、章节标题</h2>

  <!-- 正文段落 -->
  <p style="font-size:15px;color:#2c3e50;line-height:1.85;margin:0 0 12px;">正文内容，数据驱动，逻辑清晰。</p>

  <!-- 数据/重点卡片：橙红强调 -->
  <section style="background:#fff7ed;border-left:4px solid #f97316;padding:16px 20px;margin:16px 0;border-radius:0 6px 6px 0;">
    <p style="font-size:14px;color:#c2410c;line-height:1.85;margin:0 0 6px;"><strong>核心数据</strong></p>
    <p style="font-size:15px;color:#2c3e50;line-height:1.85;margin:0;">关键数据或结论性内容。</p>
  </section>

  <!-- 技术/代码块：灰蓝背景 -->
  <section style="background:#f1f5f9;border-left:4px solid #94a3b8;padding:16px 20px;margin:16px 0;border-radius:0 6px 6px 0;">
    <p style="font-size:14px;color:#64748b;line-height:1.6;margin:0;font-family:'SF Mono','Fira Code',monospace;">代码片段或技术说明。</p>
  </section>

  <!-- 信息卡片：浅蓝背景 -->
  <section style="background:#eef3fb;border-left:4px solid #3b82f6;padding:16px 20px;margin:16px 0;border-radius:0 6px 6px 0;">
    <p style="font-size:15px;color:#2c3e50;line-height:1.85;margin:0;">补充信息或扩展阅读。</p>
  </section>

  <!-- 列表 -->
  <ul style="font-size:15px;color:#2c3e50;line-height:1.85;padding-left:20px;margin:12px 0;">
    <li style="margin-bottom:6px;"><strong style="color:#0d1b3e;">要点一</strong><span style="font-weight:normal;">：说明文字</span></li>
    <li style="margin-bottom:6px;"><strong style="color:#0d1b3e;">要点二</strong><span style="font-weight:normal;">：说明文字</span></li>
  </ul>

  <!-- 表格 -->
  <table style="width:100%;border-collapse:collapse;margin:16px 0;">
    <tr><th style="border:1px solid #e2e8f0;padding:10px 12px;background:#1e40af;color:#fff;font-weight:500;text-align:left;">项目</th><th style="border:1px solid #e2e8f0;padding:10px 12px;background:#1e40af;color:#fff;font-weight:500;text-align:left;">说明</th></tr>
    <tr><td style="border:1px solid #e2e8f0;padding:10px 12px;color:#2c3e50;">内容</td><td style="border:1px solid #e2e8f0;padding:10px 12px;color:#2c3e50;">说明</td></tr>
    <tr><td style="border:1px solid #e2e8f0;padding:10px 12px;color:#2c3e50;background:#f8fafc;">内容</td><td style="border:1px solid #e2e8f0;padding:10px 12px;color:#2c3e50;background:#f8fafc;">说明</td></tr>
  </table>

  <!-- 总结卡片：深蓝背景 + 白色文字 -->
  <section style="background:#0d1b3e;border-left:4px solid #3b82f6;padding:20px 24px;margin:20px 0;border-radius:0 6px 6px 0;">
    <p style="font-size:15px;color:#e2e8f0;line-height:1.85;margin:0;">总结性内容。</p>
  </section>

  <!-- 底部装饰 -->
  <p style="text-align:center;color:#94a3b8;font-size:20px;margin:28px 0 4px;letter-spacing:6px;">/// /// ///</p>
  <p style="text-align:center;font-size:12px;color:#94a3b8;letter-spacing:1px;margin:0;">关注获取更多干货</p>

</div>
</body>
</html>
